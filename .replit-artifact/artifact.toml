kind = "web"
previewPath = "/"
title = "ЦАС — Цифровая аналитическая система"
version = "1.0.0"
id = "artifacts/cas-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21938

[services.development]
run = "pnpm --filter @workspace/cas-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cas-dashboard", "run", "build" ]
publicDir = "artifacts/cas-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21938"
BASE_PATH = "/"
